services:
  hermes:
    image: ghcr.io/adit-firdaus/hermes-docker:latest
    container_name: hermes-agent
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts
      - hermes-config:/root/.hermes
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - HERMES_HOME=/root/.hermes
      - NODE_ENV=production
    working_dir: /app
    stdin_open: true
    tty: true
    restart: unless-stopped
    command: tail -f /dev/null

volumes:
  hermes-config:
    driver: local
